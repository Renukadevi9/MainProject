<!DOCTYPE html>
<html lang="en" data-bs-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Apex Gourmet - Premium Culinary Experience. Order fresh gourmet cuisines and desserts.">
    <title>{% block title %}Apex Gourmet - Exquisite Culinary Craft{% endblock %}</title>
    <!-- Bootstrap 5 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- FontAwesome Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
    <!-- Google Fonts (Outfit & Playfair Display for premium look) -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&family=Playfair+Display:ital,wght@0,600;0,700;1,500&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --bg-primary: #0b0b0d;
            --bg-card: #1e1e24;
            --accent-gold: #ffc107;
            --text-muted: #a0a0a5;
        }
        body {
            font-family: 'Outfit', sans-serif;
            background-color: var(--bg-primary) !important;
            color: #f8f9fa;
            transition: background-color 0.3s ease, color 0.3s ease;
        }
        .serif-font {
            font-family: 'Playfair Display', serif;
        }
        .text-gold {
            color: var(--accent-gold) !important;
        }
        .bg-gold {
            background-color: var(--accent-gold) !important;
            color: #0b0b0d !important;
        }
        .navbar {
            background-color: rgba(11, 11, 13, 0.95) !important;
            backdrop-filter: blur(10px);
            border-bottom: 1px solid rgba(255, 255, 255, 0.05) !important;
        }
        .navbar-brand {
            font-family: 'Playfair Display', serif;
            font-weight: 700;
            letter-spacing: 0.5px;
            color: var(--accent-gold) !important;
        }
        .btn-gold {
            background-color: var(--accent-gold) !important;
            border-color: var(--accent-gold) !important;
            color: #0b0b0d !important;
            font-weight: 600;
            border-radius: 50px;
            transition: all 0.3s ease;
        }
        .btn-gold:hover, .btn-gold:focus {
            background-color: #e0a800 !important;
            border-color: #e0a800 !important;
            color: #0b0b0d !important;
            transform: translateY(-1px);
        }
        .btn-outline-gold {
            border-color: var(--accent-gold) !important;
            color: var(--accent-gold) !important;
            font-weight: 600;
            border-radius: 50px;
            transition: all 0.3s ease;
            background: transparent;
        }
        .btn-outline-gold:hover, .btn-outline-gold:focus {
            background-color: var(--accent-gold) !important;
            color: #0b0b0d !important;
            transform: translateY(-1px);
        }
        .nav-link {
            transition: color 0.2s ease;
        }
        .nav-link:hover {
            color: var(--accent-gold) !important;
        }
        /* Custom card style overrides */
        .card {
            background-color: var(--bg-card) !important;
            border: 1px solid rgba(255, 255, 255, 0.04) !important;
        }
    </style>
    {% block extra_css %}{% endblock %}
</head>
<body>
    <nav class="navbar navbar-expand-lg sticky-top py-3">
        <div class="container">
            <a class="navbar-brand fs-4" href="{% url 'menu' %}">
                <i class="fa-solid fa-crown me-2"></i>Apex Gourmet
            </a>
            <button class="navbar-toggler border-0" type="button" data-bs-toggle="collapse" data-bs-target="#mainNav" aria-controls="mainNav" aria-expanded="false" aria-label="Toggle navigation">
                <i class="fa-solid fa-bars text-gold fs-4"></i>
            </button>
            <div class="collapse navbar-collapse" id="mainNav">
                <ul class="navbar-nav me-auto mb-2 mb-lg-0 ms-lg-4">
                    <li class="nav-item">
                        <a class="nav-link fw-semibold active text-light" href="{% url 'menu' %}">Menu</a>
                    </li>
                    {% if user.is_authenticated and user.is_staff %}
                    <li class="nav-item">
                        <a class="nav-link fw-semibold text-gold" href="{% url 'kitchen_dashboard' %}">Kitchen Board</a>
                    </li>
                    {% endif %}
                </ul>
                <div class="d-flex align-items-center gap-3">
                    <!-- Auth elements -->
                    {% if user.is_authenticated %}
                    <div class="dropdown">
                        <button class="btn btn-outline-gold btn-sm dropdown-toggle px-3" type="button" data-bs-toggle="dropdown" aria-expanded="false">
                            <i class="fa-regular fa-user me-1"></i> {{ user.username }}
                        </button>
                        <ul class="dropdown-menu dropdown-menu-end shadow border-0" style="background-color: var(--bg-card);">
                            <li><a class="dropdown-item text-light" href="{% url 'logout' %}"><i class="fa-solid fa-arrow-right-from-bracket me-2 text-danger"></i>Logout</a></li>
                        </ul>
                    </div>
                    {% else %}
                    <a href="{% url 'login' %}" class="btn btn-sm btn-outline-gold px-3">Log In</a>
                    <a href="{% url 'signup' %}" class="btn btn-sm btn-gold px-3">Sign Up</a>
                    {% endif %}
                </div>
            </div>
        </div>
    </nav>

    <main>
        {% block content %}{% endblock %}
    </main>

    <!-- Bootstrap 5 JS Bundle -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

    <!-- CSRF Helper -->
    <script>
        function getCookie(name) {
            let cookieValue = null;
            if (document.cookie && document.cookie !== '') {
                const cookies = document.cookie.split(';');
                for (let i = 0; i < cookies.length; i++) {
                    const cookie = cookies[i].trim();
                    if (cookie.substring(0, name.length + 1) === (name + '=')) {
                        cookieValue = decodeURIComponent(cookie.substring(name.length + 1));
                        break;
                    }
                }
            }
            return cookieValue;
        }
    </script>
    {% block extra_js %}{% endblock %}
</body>
</html>
