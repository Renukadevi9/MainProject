{% extends 'ordering/base.html' %}
{% block title %}Log In - SmartBite{% endblock %}

{% block content %}
<div class="container py-5">
    <div class="row justify-content-center">
        <div class="col-md-5 col-lg-4">
            <div class="card border-0 shadow-lg rounded-4 overflow-hidden">
                <div class="card-body p-5">
                    <div class="text-center mb-4">
                        <i class="fa-solid fa-fire-burner text-primary fs-1 mb-2"></i>
                        <h4 class="fw-bold mb-1">Welcome Back</h4>
                        <p class="text-secondary small">Access the kitchen portal or your profile</p>
                    </div>

                    {% if form.errors %}
                    <div class="alert alert-danger border-0 rounded-3 py-2 small" role="alert">
                        <i class="fa-solid fa-circle-exclamation me-2"></i>Invalid credentials. Please try again.
                    </div>
                    {% endif %}

                    <form method="POST" action="{% url 'login' %}">
                        {% csrf_token %}
                        <div class="form-floating mb-3">
                            <input type="text" name="username" class="form-control rounded-3" id="floatingUsername" placeholder="Username" required autofocus>
                            <label for="floatingUsername">Username</label>
                        </div>
                        <div class="form-floating mb-4">
                            <input type="password" name="password" class="form-control rounded-3" id="floatingPassword" placeholder="Password" required>
                            <label for="floatingPassword">Password</label>
                        </div>
                        <button type="submit" class="btn btn-gold w-100 py-2 rounded-3 fw-bold shadow-sm">
                            Log In
                        </button>

                    </form>

                    <div class="text-center mt-4">
                        <span class="text-secondary small">Don't have an account?</span>
                        <a href="{% url 'signup' %}" class="small fw-semibold text-decoration-none">Sign Up</a>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
