services:
  - type: web
    name: smart-restaurant-portal
    env: python
    plan: free

    buildCommand: chmod +x build.sh && ./build.sh

    startCommand: PYTHONPATH=myproject gunicorn --config gunicorn.conf.py myproject.wsgi:application

    envVars:
      - key: SECRET_KEY
        generateValue: true

      - key: DEBUG
        value: "False"

      - key: DJANGO_SETTINGS_MODULE
        value: myproject.settings

      - key: DATABASE_URL
        fromDatabase:
          name: restaurant-db
          property: connectionString

      - key: DJANGO_SUPERUSER_USERNAME
        value: admin

      - key: DJANGO_SUPERUSER_EMAIL
        value: admin@example.com

      - key: DJANGO_SUPERUSER_PASSWORD
        sync: false

databases:
  - name: restaurant-db
    plan: free